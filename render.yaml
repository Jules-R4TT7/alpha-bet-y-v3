services:
  # Web service — Next.js + Socket.io custom server
  - type: web
    name: alpha-bet-y
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push --skip-generate
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-bet-y-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: REDIS_URL
        sync: false
      # Sentry error tracking
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      # PostHog product analytics
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        sync: false
      - key: POSTHOG_API_KEY
        sync: false

databases:
  - name: alpha-bet-y-db
    plan: basic
    databaseName: alphabety
    postgresMajorVersion: "16"
